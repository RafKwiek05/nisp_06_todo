<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Flow // Todo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <main class="todo-container">
        <header>
            <h1>Dzień dobry</h1>
            <p id="date-display"></p>
        </header>

        <section class="input-section">
            <input type="text" id="todo-input" placeholder="Co masz dziś do zrobienia?" autocomplete="off">
            <button id="add-btn">
                <i data-lucide="plus"></i>
            </button>
        </section>

        <ul id="todo-list">
            </ul>
    </main>
    <div class="theme-switch-wrapper">
    <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider">
            <i data-lucide="sun" class="sun"></i>
            <i data-lucide="moon" class="moon"></i>
        </div>
    </label>
    <span id="theme-text">Tryb ciemny</span>
    </div>
    <script src="app.js"></script>
</body>
</html>
